# Simula el paso 1 (XRDP)
sudo apt update
sudo apt install -y xrdp
sudo systemctl restart xrdp

# Simula el paso 2 (Grupo rdp)
sudo groupadd -f rdp
sudo usermod -aG rdp RDP

# Simula el paso 3 (Tailscale)
curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/focal.gpg | sudo gpg --dearmor -o /usr/share/keyrings/tailscale-archive-keyring.gpg
echo "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu focal main" | sudo tee /etc/apt/sources.list.d/tailscale.list
sudo apt update
sudo apt install -y tailscale

# Simula el paso 4 (IP Tailscale)
sudo tailscale up --authkey=$(openssl rand -hex 32) --hostname=gh-runner-12345
sudo tailscale ip -4

# Simula el paso 5 (RDP)
nc -zv $(sudo tailscale ip -4) 3389

# Simula el paso 6 (Maintenance)
while true; do echo "[$(date)] RDP Activo"; sleep 300; done
